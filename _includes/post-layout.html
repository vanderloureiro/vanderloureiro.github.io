<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link href="/assets/fontawesome/css/all.css" rel="stylesheet">
    <link rel="icon" href="/favicon.ico">

    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/mobile-style.css">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ description }}">

    <title>{{ title }} | Vanderlei Loureiro</title>
</head>

<body class="d-flex flex-column min-vh-100">

    <div class="container flex-grow-1">

        <header class="d-flex justify-content-between align-items-center">
            <a href="/">
                <span class="header-title">Vanderlei Loureiro</span>
            </a>

            <div class="social-media">
                <a href="https://vanderloureiro.medium.com/" target="_blank" rel="noopener noreferrer">
                    <i class="fa-lg fab fa-medium"></i>
                </a>
                <a href="https://github.com/vanderloureiro" target="_blank" rel="noopener noreferrer">
                    <i class="fa-lg fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/vanderloureiro/" target="_blank" rel="noopener noreferrer">
                    <i class="fa-lg fab fa-linkedin"></i>
                </a>
            </div>
        </header>

        <main class="my-5 content post-content">
            {{ content }}
        </main>

    </div>

    <footer>
        <div class="copyright">
            <p>© <span id="footer-year"></span> - desenvolvido por mim mesmo</p>
        </div>

        <div class="social-media">
            <p>vanderloureiroleite@gmail.com</p>

            <div class="social-media-footer">
                <a href="https://github.com/vanderloureiro" target="_blank" rel="noopener noreferrer">
                    <i class="fa-lg fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/vanderloureiro/" target="_blank" rel="noopener noreferrer">
                    <i class="fa-lg fab fa-linkedin"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="/search.js"></script>
    <script src="/main.js"></script>

</body>
</html>
